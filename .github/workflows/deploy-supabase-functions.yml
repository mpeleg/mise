name: Deploy Supabase Functions

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: |
          supabase functions deploy extract-from-url --no-verify-jwt --project-ref pnnfcdynznvfehabfkjz
          supabase functions deploy extract-from-image --no-verify-jwt --project-ref pnnfcdynznvfehabfkjz
          supabase functions deploy privacy-policy --no-verify-jwt --project-ref pnnfcdynznvfehabfkjz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
