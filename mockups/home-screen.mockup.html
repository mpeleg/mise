<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mise — Home Screen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #E8E2D9;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── Phone frame ─────────────────────────────────────── */
    .phone {
      width: 390px;
      min-height: 844px;
      background: #FFFFFF;
      border-radius: 48px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      border: 8px solid #1A1412;
    }

    /* ── Status bar ──────────────────────────────────────── */
    .status-bar {
      background: #FFFFFF;
      padding: 14px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px;
      font-weight: 700;
      color: #2A1F1A;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* ── Scrollable content ──────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 0;
      scrollbar-width: none;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── Header ──────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 22px;
    }
    .app-name {
      font-family: 'Lora', serif;
      font-size: 28px;
      font-weight: 400;
      color: #2A1F1A;
      letter-spacing: -0.3px;
    }

    /* ── Search ──────────────────────────────────────────── */
    .search-bar {
      background: #F2EDE5;
      border: 2px solid #DDD5C8;
      border-radius: 999px;
      padding: 13px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-text {
      font-size: 14px;
      color: #B5A89C;
    }


    /* ── Recipe feed ─────────────────────────────────────── */
    .recipe-feed {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 28px;
    }

    .recipe-card {
      background: #F2EDE5;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
    }
    .recipe-card-img {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
    }
    .recipe-card-body {
      padding: 14px 16px 16px;
    }
    .recipe-card-name {
      font-family: 'Lora', serif;
      font-size: 17px;
      font-weight: 400;
      color: #2A1F1A;
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .recipe-card-meta {
      font-size: 12px;
      color: #7A6A5F;
      margin-bottom: 12px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 400;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── Bottom nav ──────────────────────────────────────── */
    .bottom-nav {
      background: #F2EDE5;
      border-top: 1.5px solid #EAE4DC;
      padding: 12px 32px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .nav-label {
      font-size: 10px;
      font-weight: 500;
      color: #B5A89C;
    }
    .nav-label.active {
      font-weight: 700;
      color: #2A1F1A;
    }
  </style>
</head>
<body>

<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <!-- Signal -->
      <svg width="16" height="12" viewBox="0 0 16 12" fill="#2A1F1A">
        <rect x="0" y="8" width="3" height="4" rx="1"/>
        <rect x="4.5" y="5" width="3" height="7" rx="1"/>
        <rect x="9" y="2" width="3" height="10" rx="1"/>
        <rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/>
      </svg>
      <!-- Wifi -->
      <svg width="16" height="12" viewBox="0 0 24 18" fill="none" stroke="#2A1F1A" stroke-width="2.2" stroke-linecap="round">
        <path d="M1 6C5 2 10 0 12 0s7 2 11 6" opacity="0.3"/>
        <path d="M4 10c2-2 5-3.5 8-3.5s6 1.5 8 3.5"/>
        <path d="M7.5 14c1.2-1.2 2.8-2 4.5-2s3.3.8 4.5 2"/>
        <circle cx="12" cy="17" r="1.5" fill="#2A1F1A"/>
      </svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
        <rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#2A1F1A" stroke-width="1.2"/>
        <rect x="2" y="2" width="16" height="8" rx="2" fill="#2A1F1A"/>
        <path d="M23 4v4" stroke="#2A1F1A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content">

    <!-- Header -->
    <div class="header">
      <span class="app-name">mise</span>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B5A89C" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="search-text">Search your recipes…</span>
    </div>

    <div class="recipe-feed">

      <!-- Card 1 -->
      <div class="recipe-card">
        <div class="recipe-card-img" style="background:#AACC96">🍝</div>
        <div class="recipe-card-body">
          <p class="recipe-card-name">Pasta al Limone</p>
          <p class="recipe-card-meta">30 min · 2 servings</p>
          <div class="tags">
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Italian</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Vegetarian</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Quick</span>
          </div>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="recipe-card">
        <div class="recipe-card-img" style="background:#F4BEAE">🥚</div>
        <div class="recipe-card-body">
          <p class="recipe-card-name">Shakshuka</p>
          <p class="recipe-card-meta">25 min · 3 servings</p>
          <div class="tags">
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Vegetarian</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Breakfast</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Middle Eastern</span>
          </div>
        </div>
      </div>

      <!-- Card 3 — no photo -->
      <div class="recipe-card">
        <div class="recipe-card-img" style="background:#FFFFFF;flex-direction:column;gap:8px">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#C5BAB0" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
          <span style="font-size:11px;color:#B5A89C">No photo</span>
        </div>
        <div class="recipe-card-body">
          <p class="recipe-card-name">Red Lentil Soup</p>
          <p class="recipe-card-meta">45 min · 4 servings</p>
          <div class="tags">
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Comfort</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Vegan</span>
            <span class="tag" style="background:#DDD5C8;color:#7A6A5F">Soup</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">

    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2A1F1A" stroke-width="2.2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
      <span class="nav-label active">Home</span>
    </div>

    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B5A89C" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span class="nav-label">Add</span>
    </div>

    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#B5A89C" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <span class="nav-label">Search</span>
    </div>

  </div>

</div>

</body>
</html>
